日不過堂堂天子怎能把這種暖昧不雅的事情去和別人談論現在順治皇帝和小宛情好非常親熱無所不談所以不管什麽天子身份竟把這種不可告人的事也盡情的吐了出來十八得消息才子遁迹話說小宛聽著順治皇帝說起辦事掣肘時的情形心裏想道滿州人究竟不講體統的堂堂國母尚且不顧廉恥的失了改嫁心裏著實好笑但不便說明只得搭訕著道臣妾當初在金陵剛進豫王府的時候見府中上下人等個個腦後垂著辮子心中好生納罕不料進進宮來所見宮監人等也都有辮子的臣妾斗膽說一句便是皇上也垂著一條大辮子臣妾實在很是懷疑敢問辮子有什麽好處順治皇帝道辮子乃是我朝舊制猶如你們前朝的絡發成髻一般道理爲了改辮子你們漢人也不知死了多少朕看他們愚想可笑很替他們可憐哩小宛道怎的改梳辮子漢人便死了許多呢順治皇帝道妃子原來不知因爲我朝入主中原以來下詔改變舊時冠服命官紳兵民一律剃發梳辮有許多不明事故的愚民寧可砍掉腦袋保存這些頭髮所以死了好多的人哩小宛道皇上命他們改變冠服原是應當的臣妾的意思妄擬教他們剃一些頭髮也不見許多區別不如下旨教他們把頭髮統都剃掉做個和尚來得爽快哩順治皇帝道妃子且莫輕視和尚倘使天下百姓都做了和尚到也看透塵凡自求生趣天下便從此永久太平可算到了極樂之境了小宛聽著覺得到也有理這一篇說話原是他們兩人無心之言卻到成了預讖這是後話不提在下現在丟過宮中之事且說那光福司典史錢雁嵌因爲巡撫采梅受了很大的損失寫信給他伯伯錢牧齋把前後情形說了詳細牧齋得信心想宮中的董妃生長江南卻愛梅花這是什麽樣的人忽然想起前年冒辟疆來信說起他侍姬董小宛被亂兵掠去莫非便是他嗎錢牧齋這個老頭兒原是喜歡管閒事的有了這種疑心便托人到宮監方面探聽消息不到幾天果然消息探到雖沒知確是辟疆的側室但已探到此人姓氏籍貫牧齋老肚子裏把念頭一轉早已知道必是小宛無疑立刻寫了一封信告知冒辟疆此番情形那冒辟疆自從小宛被掠以後托人四處尋覓尋到現在哪有什麽下落真是急得上天無路入地無門忽然接到牧齋來信才知小宛已經進了皇宮侯門一入深如海從此蕭郎是路人辟疆初心本想將來或有見面之日現在已入深宮盼望從此完了但在專制的權威下面怎敢說什麽閑言又因自己的側室輾轉流入宮庭覺得顔面不很好看仗著他滿腹才華便做了一卷憶語說是悼小宛而作的他說小宛是死于勞瘁其實他說小宛死的那天便是小宛被掠的日子他從此也覺得愁悶異常悒悒毫無生趣惟有放懷詩酒自樂餘年雖有江南的總督巡撫奉旨征他進京他恬淡自適置之不理錢牧齋也幾乎勸他入仕清朝他仍是一笑置之別人不知道他內心的人以爲辟疆必是不忘明朝其實他因小宛入宮和清帝結了不世之仇哩但他這牧齋告假回裏掃墓特赴如臯想當面勸他不必固執這時牧齋身躋卿相翎頂輝煌見著辟疆忙的卸了纓帽剛想發言辟疆或翹起腳來把牧齋的帽子踢到地上嘴裏卻得意洋洋的說道我本是多愁多病身怎當你傾國傾城貌說著也不理會竟自退入後堂牧齋惹了一場沒趣知辟疆有難言之隱也只得悄然自去從此以後也無人敢勸辟疆出仕辟疆便做了明朝的遺民永不仕清壽登期頤而卒一言表過辟疆不提十九受掣肘好事多磨話說順治皇帝自和小宛定情以後寵愛的了不得不過小宛時時觸動心事往往於愛情濃密的時候頓時覺得不歡起來順治皇帝怎知小宛的心事以爲小宛必是善於憂愁所以無端的時常愁著哩便覺得多愁善感乃是美人生性不妨時時勸慰使她破顔爲笑因此順治皇帝想盡方法寬小宛的心小宛也明知順治皇帝是多情種子怎能說出惟有悶在肚裏不過經了互相憐惜的情形兩人的愛情便益發的濃厚起來順治皇帝原非酒色庸君但因得了小宛感情好到極點便覺得一步都不忍離開又因受了攝政王的刺激國事更懶得辦理小宛見順治皇帝倦勤的情形很怕爲了她自己的緣故使得順治皇帝怠惰起來所以時時的進諫力勸順治皇帝勤政從公凡是朝臣所上的奏章小宛都幫著順治皇帝一一細覽順治皇帝見小宛不以私情廢公事心中當然是讚歎得很對於小宛更是疼愛了凡是供給小宛的東西都是精中求精美中求美小宛見著奢侈情形很以爲皇家一席酒窮人十年糧實在有些過意不去便在順治皇帝面前時勸崇尚儉德說宮中無論宴會或禦宴飲饌只求適口而已不必過於豐盛順治皇帝聽著她說更是欽佩非常便把小宛當作心頭之肉格外體恤起來小宛見順治皇帝格外體恤于她也把順治皇帝當作親人看待所以對待順治皇帝也特別體恤每到晚晌在順治皇帝臨睡的時候小宛必親自查屋裏邊的熱度怎樣總要把熱度調和得勻當所以順治皇帝住得非常安適幾乎一刻都不能離了小宛小宛在綺明宮內也便專寵了好幾年且說順治皇帝早年所立的皇后原姓佟佳天姿到也篤厚但和順治皇帝感情不很融洽幾年來順治皇帝寧可獨居別宮自從小宛進宮以後順治皇帝和佟佳後更是疏遠得很那佟佳後雖不是十分潑辣的人但也不免有些怨言這時佟佳後已生了皇子取名玄燁不過她眼見小宛深受恩寵又因小宛這時也是有孕在身萬一將來小宛生了皇子順治皇帝愛母及子那麽皇帝也未必定由自己的兒子繼承了她有了這一種觀念益發的悲愁起來順治皇帝見佟佳後終日不見歡容誤會了佟佳後的意思以爲佟佳後故意和他過不去心想既然彼此感情不融洽不妨廢掉重立皇后因此順治皇帝便下詔把佟佳後降爲靜妃想另立小宛爲皇后這道詔書下了以後一般王公大臣們都說皇后並沒失德萬不可把開國元君竟做出廢後的事情來那攝政王也執意不可原來佟佳後乃是攝政王當初給順治皇帝定的親事所以他非但說佟佳後不可廢並說董雜訊妃乃是漢人照滿家定例漢人萬不能立爲皇后的順治皇帝本想和攝政王辯論幾句只因攝政王用祖宗家法來壓他當然也不說什麽只說佟佳後定要廢掉攝政王見順治皇帝抱定主意便不歡而退順治皇帝等攝政王退出宮後便到綺明宮來見著小宛把想廢佟佳後和另立她爲皇后的事情說了一遍並把王公大臣攝政王阻撓的話也說了出來小宛聽著覺得自己萬不能正位皇后的因爲皇后也不過是虛名反結了無數的冤仇非但於自己沒有利益且要發生重大的危險問題所以她心中便打定了主意在順治皇帝面前竭力推辭二十抱喪明悒鬱致疾話說小宛不願結了許多冤仇徒擁皇后的虛名所以聽了順治皇帝的話便推辭道臣妾自承恩寵獲列妃嬪弱草殘枝蒙沾雨露已是欣幸無極倘再妄想非分正位中宮那是非惟臣妾萬不敢當反能折了臣的福分哩所以臣妾昧死謹辭順治皇帝聽著知道小宛不肯正位中宮恐怕結了冤仇孤掌難鳴所以慰道愛卿不必多慮正位便是一切都由朕主張小宛聽了仍辭道臣不敢正位實有至情雖蒙皇上謬愛臣妾萬死不敢承受順治皇帝聽著仍竭力勸慰小宛執意不肯幾乎連眼淚都急了出來順治皇帝見她出於至情也不十分強她到了明日上朝和王公大臣攝政王等議論廢後的事順治皇帝雖是執意要把佟佳後廢掉怎奈佟佳後外援很多沒人不是幫她的攝政王更是全力助她順治皇帝見攝政王時把祖宗家法的話來壓他到覺得無詞可辯只得收回成命佟佳後到底沒曾廢掉小宛到底沒得正位但是順治皇帝終因達不到目睥心中非常牢騷想起好事不成都是攝政王從中作梗的緣故所以把攝政王結了切齒之仇恰巧那天晚晌小宛産了一個皇子順治皇帝很是欣喜在綺明宮內伴著小宛談談說說到也並不岑寂順治皇帝想起小宛不能立後終覺得堂堂天子不能庇一婦女處處受制於人實很愧對小宛又恐小宛因此悒鬱所以慰著小宛道朕初想廢掉佟佳氏正卿繼位皇后原不是把虛名羈卿乃是想和卿白頭偕老罷了現在阻力橫生事已無望也不願固執成見和他們力爭致開國元君有盛德之累哩但擁虛位稱尊處處仰人鼻息實沒生趣可言所以卿既未得正位朕也久已看透紅塵寧可棄掉這個齷齪皇帝退居平民和卿倡隨終生然而這種心理又難達到目的真教朕左右籌思毫無一些興味了小宛聽著知道順治皇帝愛她愛到極點所以寧可棄了天下和她永結美滿姻緣雖覺得至情可感但事實上終不能辦到的因此只得勸慰順治皇帝他們兩人你慰著我我慰著你的互相憐慰愛情濃蜜真是如膠似漆過了幾天早到了皇子彌月之時少不得宮中手忙腳亂的忙了一番那皇子容貌清秀和小宛生得一般模樣順治皇帝見著當然是歡喜的了不得賜名福全小宛也把福全疼愛得很怎奈人生禍福都由老天注定的那福全雖生在皇帝家還覺得呱呱墜地不很願意所以偶染微疾醫藥罔效竟至瞑目長逝順治皇帝抱著喪子之痛心中十分悲哀小宛見愛子夭折好像割了心頭之肉更是哀傷異常順治皇帝百般勸慰小宛看在順治皇帝的面上雖有時哀傷得好些但人孰無情怎能立刻便淡忘起來小宛這時悲悼愛子更感到心血來潮把從前所經過的刺激和許多際遇一齊湧上心頭愁中加愁悶上加悶悒鬱得生趣都泯滅無遺順治皇帝見她悒鬱模樣用了無數的解慰方法只是小宛所受刺激太深終不能愁腸變作歡腸小宛體本纖弱日夜愁思怎不愁出病來大凡因愁所致的病往往伏在體內一時雖不覺得什麽有一天發作起來那可不是小看的所以小宛初病原不甚重遷延了幾天病中仍是愁悶既病又愁病得當然加重起來了更兼產後虛弱病勢益發沈重早忙得那順治皇帝征醫選藥一般奉旨調遣的太醫們也忙得個個手足無措太醫院的醫生知道小宛是皇上身邊第一個寵妃萬一有了差處恐怕腦袋要和軀殼宣告脫離關係所以很是憂慮二十一了孽緣香消玉殞話說小宛愁悶悒鬱奄然成病又因產後虛弱病勢更是沈重起來那般太醫院的醫生和各省征選的名醫平日雖都自鳴得意自負國手但到了這時非惟不能使小宛病告痊愈反而使小宛病勢一天重似一天順治皇帝見小宛病入膏肓盲勢將不起急得直和熱石頭上的螞蟻一般模樣小宛也自知病已漸危病中觸動舊事當初和冒辟疆的情形仍是歷歷心頭又感著順治皇帝十分厚待深情蜜意也著實有些割捨不下她病的時候順治皇帝原是伴著不離到了這時覺得風中殘燭命在旦夕卻又不說什麽恐怕順治皇帝因情受感惹出別的事情來所以也不把自己的感觸說了出來只對順治皇帝說那解脫的話那天順治皇帝坐在榻側見小宛病骨支離瘦容可掬一時疼憐到極點不覺眼眶中掉下淚來小宛見了這般模樣不免至情發現珠淚也不覺奪眶而出順治皇帝見小宛掉淚恐怕小宛病中又勾起愁悶反擦幹了自己的眼淚慰著道卿病雖重安養了幾天想可痊愈的卿不必多慮自己保重便是即使卿不幸有了差處朕也從此看破紅塵那皇帝虛位朕久已淡而視之的哩小宛聽了答道皇上深情臣妾銘感在心臣妾不幸病不能起身軀雖死寸心卻仍是依戀皇上左右的甚而至於軀殼爛掉或軀殼化作灰塵臣妾倘有一分魂魄便當飄在皇上身旁的但臣妾死後皇上又何必這樣的蕭索呢皇上是開國元君素來英明有爲雖是愛妾情深究竟國家爲重不必因臣妾而影響大局才是況且臣妾生來命薄自幼至今風塵轉徙回想當年本覺浮生一夢而已臣妾生性愛花每覺人不如花因爲花開花落雖亦徒事忙碌但花落以後明年遇著春風枝頭又可欣欣向榮只那人生死最可悲莫說死了不可再生便老了也不可再少百年能有多時況臣妾年方三十以外上壽中壽既不可得連下壽也不得享想起和皇上平日深情一旦慘遭死別真是心痛如割哩順治皇帝聽著不覺慘然淚下只得仍用婉言來勸慰解又過了幾天小宛已是一息奄奄順治皇帝早哭得像淚人兒一般小宛攙了順治皇帝的手強睜那似開非開的眼睛對著順治皇帝看著輕啓櫻唇想要說話卻又說不出來眼眶中只掉了回淚順治皇帝見了更是傷心等了片時小宛竟把四肢挺直棄了順治皇帝魂歸離恨天而去順治皇帝還想用人力續回天命怎能辦到哭了一會只得傳旨厚辦喪儀一般王公大臣們少不得又忙碌異常爲了這樁喪事倒楣的可有發財的也有閒話不提且說順治皇帝自從小宛死了以後悲悼的寢食俱廢太后雖曾勸他把胸懷寬放些怎能回他的心那順治皇帝因小宛生前未得正位皇后終以爲是遺憾現在小宛已死佟佳後卻依然存在他心想廢後雖難辦到追封小宛大概沒有敢再攔阻的人便下旨追封小宛爲溫存皇后攝政王見小宛已死那皇后虛名便追封了也沒甚麽要緊的所以置之不問一般王公大臣們見攝政王此番並不反對誰還敢說半個不字大家便各自閉口不見再說那佟佳後聽得小宛已死便像拔去眼中之針一般模樣心中當然快樂了些但她卻有自知之明心想小宛雖死自己也萬難繼承小宛恩寵的情形因爲當初小宛未進宮以前自己和順治皇帝的感情本不很好的但是勁敵已去自己的心中終覺得舒泰得多了二十二傷心人敝屣軒冕話說小宛死了以後順治皇帝悲悼的非常恰巧那攝政王暴病而亡順治皇帝的生母原是下嫁于攝政王的現在攝政王已死太后觸景傷懷便想重再歸宮這個消息奏上以後順治皇帝雖覺得攝政王死了對於自己好像脫了束縛似的只得愛妃剛死心中覺得萬箭穿胸哪有心思再管閒事不過皇太後究竟是自己生身之母當初下嫁雖不應該現在悔過想重回宮來看在先皇份上怎能拒絕所以皇太后便回宮來順治皇帝仍把她當作太后看待但是順治皇帝近來辦事雖沒有掣肘的人因爲小宛已死到覺得身外之物都是空中幻想很有參破紅塵點悟禪機的意思他又想起太后回宮已有主持的人自己很可以趁此機會卸下肩來覓尋樂境而去他主意定妥卻不露風聲明晨上朝和王公大臣們敷衍了一回散朝回到養心殿內命宮監宣詔鼇拜進見那鼇拜宮居丞相順治皇帝喚他進宮乃想教他好好輔佐新帝很有顧命的意思後來鼇拜等新帝即位以後竟借了這個題目圖謀不軌起來事情露泄腦袋不保事關後來不涉本書表過不提那鼇拜奉召來到順治皇帝見著便說道朕開國登基至今已有十八年了十八年中間的種種際遇甜的也有苦的也有榮的也有悲的也有滋味都已嘗過那未來的情形也不難推想而知了即使再有歡榮甜蜜的際遇也不過一時的幻景罷了況且此後的日子只有悲苦的際遇了這樣講來人生在世實在沒趣到極點所以朕現在參破紅塵心想何必再在世間享受這種無謂的虛名還要爲了這種無謂的虛名天天的料理俗務未免更是自尋煩惱了朕自有區處決不再戀著紅塵哩鼇拜聽著不明白話中真因以爲順治皇帝或因小宛病亡精神上所受刺激太深致說話有不倫不類的情形正想用話去安慰他幾句順治皇帝卻又說道將來嗣皇帝繼承大統的時候朕定當跟在王公大臣的後面看這大典的盛況哩鼇拜聽了更是莫明其妙一時答不出話來只得唯唯應著肚子中盤算了片時才想得了一句話剛要啓口那順治皇帝卻已閉著眼睛睡著了便只得悄悄而退那順治皇帝本不是睡著的所以等鼇拜走了以後便自己想道士爲知己者死那小宛本是爲自己有情的知己現在知己已經歸離恨天而去此後也並沒興趣可言不如超脫塵緣修清淨真果遁入空門或可和小宛重證姻緣于來生的他主意想准便脫去龍袍換上民間衣服叮囑許多心腹宮監嚴禁他們聲張私自悄悄的出得宮來離了北京直向京西而去暫且不提單表宮中不見皇上當然起了很大的恐慌那般心腹宮監受了順治皇帝的密囑又不肯說出所以然來於是皇后佟佳後等和許多王公大臣們個個如墜五里霧中但皇帝失蹤乃是千古奇聞不便說明只得頒下哀詔說是駕崩皇太后便擁立佟佳後所生的皇子玄燁繼立改元康熙新陳代謝又忙了幾天皇太后因爲順治皇帝失蹤究竟是骨肉情切便探問許多王公大臣們的意見那般王公大臣們平日只知道吃喝睡覺到了這時個個呆若木雞只有鼇拜卻是衆醉獨清便把當天和順治皇帝所談的一篇話說了出來皇太后仔細一想才知順治皇帝必已悟了禪機遁入空門了便派了許多幹練的欽差四處尋覓順治皇帝的蹤迹二十三清涼寺皈依參禪話說順治皇帝離了北京以後在途中思忖前行的方針便想不如向五臺山的清涼寺而去晝行夜宿也不知行了多少路程才到了五臺山那清涼寺的住持和尚名喚園智年已八十多歲那天恰因奉了巡撫的密劄大做道場說是爲了先皇順治皇帝而做的順治皇帝在寺外聽得小和尚談論此事不覺暗暗好笑面上是仍不露聲色直闖進山門而來早有小和尚報與圓智知道圓智忙的出來擡頭把順治皇帝仔細一看只見來客非但衣服華麗並且儀錶軒昂老和尚何等勢利便滿面堆笑迎入方丈而來分賓主坐定圓智問道居士是從哪里來的來此又爲怎的順治皇帝道弟子從北京來此特來拜謁大師的園智見他舉動不凡另有一種尊嚴氣概便又問道居士尊姓高名願請指示順治皇帝聽著笑而不言圓智見他恍恍惚惚的模樣知道內必有因便請順治皇帝到一間密室裏面問道居士倘有隱情不妨直告貧僧終當嚴守秘密的順治皇帝道大師不必多疑弟子此來求爲沙彌倘承大師不棄弟子便當在寺受戒否則當向他處受戒去圓智驚道居士不像隱於禪門的人怎的要受起戒來呢順治皇帝答道弟子是棄了天下始來此棄天下如敝履還說弟子不像受戒的人呢圓智聽著才知順治皇帝原來棄位來此並沒死掉不覺驚得手足無措順治皇帝見他驚惶模樣說道大師不必這般恐慌倘大師不肯收留弟子另去便是說著又附了圓智的耳朵說了許多話這許多話因爲在下做書的沒曾聽見所以不能寫了出來大概他所說的乃是出家緣由的話圓智聽了說道居士想由色相證菩提嗎這非有大智慧的人是不可的恐怕居士混慣軟紅塵中不耐這種清淨況味哩順治皇帝道弟子的志是決定的了大師是不能見信嗎不妨試一試便是圓智點頭稱是到了晚晌圓智預備床榻請順治皇帝宿在方丈中間彼此談論經典順治皇帝所答的話解脫的很是超妙圓智到沒話可去和他辯難便非常歎服過了幾天便給順治皇帝披剃受戒法名慧真另辟一所精舍去安置他款待得非常優厚一般和尚們見他新進來的卻勝過舊人不免都起了嫉忌心圓智知道這許多和尚都是嫉忌慧真的便和許多和尚說道你們聽著將來定有貴人來此探訪慧真的圓智說了這話雖沒曾說明詳細但一般和尚已知道慧真是非常人了從此到也並不嫉他且說慧真披剃以後終日默坐也不和別的和尚交接經典讀得爛熟有時詠詩消遣旁及詩書六藝沒有一樣不是博纜精通所以清涼寺的和尚都呼他爲異僧有一天有一個小和尚名喚慧安偶和別的小和尚說起吳三桂在雲南起兵造反的事情不料被慧真聽著便忙的問道咦吳三桂是反了嗎慧真說這句話把慧安嚇了一跳原來慧真從來不發一言現在破題兒說起話來怎不驚訝從此以後每天必向慧安按問軍情好像和他很有關係的慧安莫明他的用意也不敢不把軍情去告訴他直等到雲南事平慧安把消息告他他不覺喜形於色慧安更是起了疑心恰巧有一個小和尚在慧真室內拾得幾張碎紙紙上寫了幾行字去獻給慧安慧安把來細看只見斷簡殘編上面寫有好像詩句似的道我本西方一衲子黃袍換卻紫袈裟慧安文理不很十分高妙也不解這兩句的所以然來但是疑惑的因此益發的大了那慧真便在清涼寺一住了好幾年二十四大佈施南巡賜襪話說清涼寺的和尚們都很疑惑慧真的來歷有一天忽然巡撫有命傳圓智去見滿寺的和尚們驚惶的非常不知是禍是福隔了五天圓智才得回來和尚們便去問訊圓智道咱們的清涼寺是交著運了巡撫穆大人告訴我說現在的皇上崇尚佛教奉太皇太后和皇太后要到咱們的五臺山來囑我就咱們的清涼寺恭辦行宮以備三宮駐蹕和尚們聽著快樂的了不得圓智道你們忘了嗎當初我和你們說那慧真不是常人必有當世聖人來此探訪現在果然應著我的話了你們現在能知慧真是怎等人呢和尚們道弟子們眼力薄弱不能測得大師知道他嗎圓智道居移氣養稱體要測想他是怎等人定要先看他的起居是怎樣行動是怎樣靜心去留意才能思過半哩慧安在旁邊聽著忙的答道這樣講來慧真是順治皇帝無疑了圓智微笑了笑把腦袋點一點道是的哩我死後這裏的住持便命慧真去當呢慧真做了這裏的住持你們也可靠著他的福哩和尚們聽著個個歡喜而退不到幾天車駕將到和尚們日夜忙碌佈置行宮才得辦理妥當忽然巡撫來了一道密劄說車駕已到龍泉關因爲龍泉關地方山勢險隘車駕不易度過太皇太后和皇太后等耐不住辛勞太皇太后又因年歲已高所以便在中途駐蹕康熙皇帝卻直向清涼寺而來原來康熙皇帝登基的時候年才八歲因爲先皇失蹤太皇太后雖四處派人探聽順治皇帝的蹤迹哪有什麽下落直到這時康熙登基已是六年了才得密探報告說五臺山清涼寺有一異僧平日不和別人說話情形很是可疑太皇太后聽著心想異僧或許便是順治皇帝所以命駕而來表過不提且說康熙皇帝來到清涼寺帝命出巡不比尋常儀仗人馬好不齊整圓智忙著迎駕和尚們也個個忙碌異常惟有慧真卻依然靜坐不言康熙皇帝歇宿行宮圓智前去叩安康熙皇帝劈面就問道這所清涼寺有多少和尚圓智道共有三百零八名康熙皇帝道朕因皈依佛教獎勵僧人起見凡是這裏的和尚每名各賜禦襪一雙惟須當面換著朕可以知道不致遺漏一名圓智聽著唯唯聽著唯唯答允立即敲了雲鍾傳集滿寺和尚排隊來見原來康熙皇帝賞賜禦襪乃是生的一計因爲順治皇帝逃禪而去的時候康熙皇帝只得八歲皇帝家不比民間父子是不常見面的又是小孩子眼力差些隔了六年時間面貌已是無從記起太皇太后便和他說是順治皇帝在腳底上有紅痣七顆到了清涼寺可借賜襪之名查看和尚的腳倘然見到紅痣的和尚便是順治皇帝無疑了康熙皇帝得了這個秘密記號早預備許多布襪正備行事不料清涼寺的和尚們雖是聽得鍾響齊來出見惟有慧真聽得這個消息早已料到中間蹊蹺一時又無可躲避慌了生得一個急計策便跑到廚房中間假做燒火模樣心裏燒火的乃是火夫不是和尚便可避此查看了那許多和尚齊集之後因爲人數太多也沒有留心著慧真圓智便上前啓奏道和尚們都已齊集候皇上調譴康熙皇帝便命宮監把三百零八雙布襪分賜許多和尚人多手快那消多時和尚已遍派無遺但是多了一雙布襪回來康熙皇帝心想襪未數錯怎的會多了一雙回來呢便再去查點人數果然只有三百零七名康熙皇帝便喚圓智來前怒問道你們總共有三百零八名和尚怎的只有三百零七名呢圓智聽著汗流滿背的奏道或是有一名未聞鍾響忘了出來待我去尋來便是二十五真解脫永絕塵緣話說圓智因爲和尚少了一名四下裏尋找在廚房中果然尋到了慧真便教他出來見駕慧真執意不肯圓智道聖上駕到來此訪問也是人子美意便去見面何妨慧真聽著無可推辭只得出見宮監把襪取來便伸手要慧真脫去舊襪慧真本待不依怎來得及舊襪脫下腳底下的七顆紅痣早便顯了出來康熙皇帝在旁見了待要跪下地去慧真忙的搖手示意康熙皇帝礙著許多和尚的耳目只得暫時忍著慧真借此機會便回到自己的禪室而來那禪室在一座高峰的上面康熙皇帝便跟蹤而至因爲山路崎嶇便命慧安引路到了那邊慧安進前報道師兄聖上來了慧真閉目跌坐理也不理好像沒曾聽見的模樣康熙皇帝見了不免至性感動幾乎把眼淚都掉了下來突然的跪了下去抱住了慧真的腳說道父皇子臣萬死直到今天才得來叩父皇的安慧真聽道微微的把眼睛睜了開來問道居士是怎等人現在說的是什麽話山僧實在不能明白康熙皇帝見他假裝癡聾只得仍呼著父皇慧真假意的驚道誰是父皇父皇是什麽山僧是世外人不知這情由的哩康熙皇帝跪在地上不肯起身的匍匐道子臣不肖不能上系聖心父皇不看子臣的面難道便不念太皇太後嗎慧真聽著仍不動心卻又故意的說道聖上錯了聖上錯了他一邊說著一邊卻又非常驕倨見康熙皇帝跪在地上也不理會慧安見康熙皇帝跪了多時定已勞乏便道天將晚了聖上還是下山歇息罷康熙皇帝因爲慧真終不吐實情只得退了出來便叮囑慧安不可把這事聲張出去康熙皇帝當晚便在清涼寺歇宿明日回鑾又在龍泉關歇了一宵天明後才奉了太皇太后和皇太后起駕回京把這件事告知太皇太后和皇太后也沒有能動慧真之心的辦法康熙皇帝無奈只得頒發內帑二十萬兩銀子把十五萬佈施清涼寺把五萬佈施五臺山其餘許多的寺廟庵觀於是每隔二三年的時候康熙皇帝必往清涼寺進香一次到了清涼寺必到高峰去參謁慧真的直到第三次巡幸五臺山的時候清涼寺的主持和尚圓智已經圓寂康熙皇帝便想請慧真去繼充主持慧真哪里肯依康熙皇帝又沒奈何他並且想起清涼寺自從佈施鉅款以後規模巨集壯已成了天下第一名刹即使慧真做了主持他若遇事放任毫不經心那時清涼寺偌大的氣概也必因此而渙散的所以也不強他便把慧真封做懋修大道無上光明佛位在主持之上那主持和尚康熙皇帝便命慧安充任因爲慧安很有功勳便是引路到高峰的關係那慧安偏又生性伶俐非但侍候康熙皇帝特別的周到便那侍候慧真也是格外謹慎康熙皇帝見他這般情形心想有了這人到可以使得父皇安心清修不致惹出別的問題來看他智慧兼大所以特惠殊恩把慧安封做智覺佛其餘滿寺的許多小和尚也各有各的封號各有各的賞賜表過不提且說慧真一心皈依六根清淨任憑康熙皇帝怎的擺佈他終是置之不問不聞住了好幾年他便想到南海普陀西湖靈隱等處雲遊又怕直說出來少不得慧安又要飛表奏知豈不受了束縛不能瀟灑自在所以他又悄然的不別而行那慧真離了清涼寺以後小和尚忽然尋不到他忙的和慧安說明慧安恐康熙皇帝要責備自己也著實捏了一把汗但轉念一想他既是入了禪門總想修成正果既無牽挂自能回來慧安想到這裏心便寬了二十六倦雲遊歸真證果話說慧真離了清涼寺直往南去因爲當時人物殷庶凡是行腳僧人到一處便有一處的人爭著供齋留舍到也逍遙自在行了好幾個月的功夫才坐了飄洋船來到普陀頂禮進香沒一挂漏在普陀回來便到西湖的靈隱寺內少不是又是見佛進香逢像頂禮足足又耽擱半年光景把偌大的西湖遊覽無遺慧真愛著西湖風景的優美便想在那邊挂錫幾年只因耳目衆多很不方便便起程北返他想起從前董小宛常和他說起蘇州的風景比了杭州也不多讓有許多地方杭州反不如蘇州的因此他便來到蘇州虎丘天平遊了一回忽又想起一樁事來他想道錢牧齋明末遺臣曾仕我朝常誇口故鄉常熟有座虞山乃是吳中第一名勝現在牧齋屍骨已寒何不順道去一遊哩他想定方針果然便來到常熟直至虞山且說那虞山的風景實在是清秀異常不愧說是吳中名勝那山上有座寺廟喚作三峰寺規模固然及不著清涼寺的宏偉莊嚴但在江南卻已首屈一指的了慧真來到虞山見著三峰寺當然便去謁見方丈那方丈法名玄空道行到也高妙見慧真來到彼此免不了互道寒暄慧真只說是五臺山清涼寺來的卻不說出慧真的真名另起了一個假號喚作川三台那川三台的意義便是隱寓順治兩字這種暗謎玄空等怎能知道所以覺不著慧真是怎等的人只因和慧真談了一回禪禪語高深玄空便以爲慧真必非是平常的僧人那玄空便想借慧真的名義去掙幾個銀錢來用用說是從五臺山請到一名高僧川三台在此駐錫開講經典廣建水陸道場七七四十九日功德才能圓滿一般善田信女聽到五臺山高僧在此講經也不問好歹爭先恐後的到來佈施的佈施聽經的聽經這四十九天中間三峰寺內人山人海空前未有玄空掙了個挺飽只把慧真忙了四十九天才算玄空不是忘恩負義的人功德圓滿以後慧真便想告辭而行玄空堅意苦留慧真因爲盛情難卻便在三峰寺挂錫光陰迅速不覺過了二年慧真思鄉心切便和玄空訂後約而別沿著原路仍回到清涼寺來小和尚們見慧真來了忙的報知慧安慧安出去相迎各敘了別後之事到覺得久別重逢情益款密起來只是慧真長途勞頓受了些風寒忽然發起病來清涼寺原在深山之中一時雇不到醫生慧安急得慌了命小和尚飛忙尋找苦得那小和尚腳底跑穿才在五台山口山腳下小村內尋到一位庸醫生這位庸醫生說也可笑連湯頭歌訣都沒有記得清楚請到清涼寺看了一看慧真的病症也不說什麽只說喝了一劑湯藥立刻痊愈的好在藥料不必往藥鋪子去買的因爲庸醫生隨身有個法寶法寶便是一隻小箱箱內滿裝著許多紙包他自己說是藥其實也不知裝的是什麽也是慧真命該斷絕所以喝了庸醫生的湯藥便上氣接不著下氣的喘得不堪慧真知道命必難保了心想一死到也乾淨冥中如有因果魂歸大羅天上或可和小宛再證仙緣但轉念想起自己忽而得天下稱皇帝忽而棄尊位做和尚到覺得虛度一生了便嘴裏吟道來時鶻突去時迷空在人間走一回吟聲甫畢眼睛閉著果然魂歸大羅天而去慧安便忙著料理喪事飛表奏知康熙皇帝雖很哀悼只因他生前耽禪皈依便想終成他志密旨慧安教他把慧真肉身先遍身塗漆外面再加塗重金安置清涼寺中昭示萬代慧安奉旨當然如法行事所以直到現在順治皇帝的肉身金裝仍在五臺山清涼寺中
