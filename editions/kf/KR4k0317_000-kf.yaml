疆心想小宛獨留城中終不是善策便想把小宛託付給他的朋友但辟疆的母親因爲小宛非常賢慧不忍亂中分離所以仍舊攜著同去他們全家便同住城外無如世途崎嶇生當亂季豈能安居靜處所以他們全家遇到風聲緊迫的時候便雇了小船出去避難也不管路程遠近在路上饑寒風雨受盡風塵之苦不料有一回馬鞍山地方遇著大隊清兵殺掠一番衣飾東西掠得乾乾淨淨只和回到鹽官城中想在親友處設法些衣食銀錢怎奪都在亂中彼此都是自顧不遑四處張羅僅得一條毛氈辟疆恐父母受驚便命他妻子先陪了他父母到城外舊寓中去安歇自己和小宛暫住城中探聽消息這時正是殘秋天氣窗風四射辟疆感受風寒痢瘧雜作便橫了一扇板門作爲床榻辟疆蓋著一條破爛棉絮僵臥在上面小宛卷了一條破席日夜在旁邊侍候辟疆足足的病了五個多月八參分離勞燕東西話說辟疆在大亂之中病了五個月早又冬盡春來幸而平日小宛悉心服侍天冷便去擁抱天熱又去披拂凡辟疆意思所到的地方小宛無不盡心安排煎的蕩藥自己必先去嘗了然後再獻給辟疆受用甚而至於辟疆所下的糞穢也是用鼻子去嗅眼睛去看看著情形漸有起色便喜不自勝遇著避疆病勢沈重的時候竟天的衣不解帶的在旁侍候辟疆病失常性往往無端暴發大怒小宛明知辟疆並非故意和自己詬誶曲意承受色不少許辟疆的父母妻子見小宛這樣的賢慧益發疼愛起來又見她辛苦了好久日子已是骨瘦如柴面枯如蠟便教她節勞暫息她卻仍是不辭勞瘁直到仲春時候辟疆病才稍痊因爲鹽官正遭兵變勢已不可一日安居便即雇船回裏冒險渡了長江聽得如臯亂事還沒曾完全平定不敢貿然回去便在海陵地方暫覓小屋居住過了一年又是炎夏時節才得如臯亂平消息辟疆便偕同全家重返家鄉但遭逢大亂屢受驚嚇辟疆舊病復發勢益沈重小宛仍是日夜的侍候有時坐在藥爐旁邊親煎湯藥有時伺在枕邊足畔躬承扶攜足足的又過了六十多天辟疆病有轉機忽然又得奇疾背上生了一個大疽少不得又是辛苦著小宛隔了三個多月辟疆病方痊愈小宛卻積勞病了起來但她生恬恬雅雖是病軀纖弱卻仍到園圃中洗菊藝蘭去遣她清興辟疆因小宛處處能體諒自己所以現在小宛有病他也十分體恤便連他父母妻室也都看重小宛小宛病勢本不很重隔不多時病便好了從此家園安處骨肉團圓到也很得天然樂趣早又過了兩個年頭七夕那天的晚晌小宛和辟疆在庭中觀看天上流霞覺得像條金蛇似的著實可愛便想起自己的金珠首飾都在亂中失掉現在見著流霞想要把金釧臂來描似流霞的模樣辟疆當然滿口應允隔了幾天辟疆果然給小宛購到一對金釧釧的陽紋旁邊還刊著比翼連理四個字小宛見著非常欣喜以爲是白頭偕老的預兆了駒光過隙一年容易又是桃紅柳綠豔陽天氣那年正是順治七年辟疆這時因爲一般詩友在荊溪雅集便也來到荊溪卻不料如臯地方的駐防清軍恰於此時兵變起來亂兵四出劫掠素知冒家是很有錢的亂兵的首領名喚阿史崔便結合大夥人馬首先來到冒家那由他說凡是值錢的東西都捆載而去臨去的時候阿史崔見著小宛的美貌豔質模樣便令兵丁們前呼後擁的把小宛搶著同行小宛沒力抵抗只得由他們擺佈倉卒之間無物可攜只留著那副金釧套在臂上想留作紀念的亂兵們吆吆喝喝辟疆的父母妻室也不敢和小宛說訣別的話又恐小宛不肯同去吃了眼前虧所以都道不必推阻便自去罷後會有期不難相見小宛聽著才痛哭了一番跟了亂兵而去這時辟疆在荊溪詩友雅集的事已經完了正當春雨連綿不免鄉思彌劇那天在朋友處小飲而歸已是三更時分獨自在客寓中思忖心事待要伏枕安睡朦朧中忽然覺得自己已回家中和父母妻子暢敍別情卻不見小宛在側不覺小叫一聲小宛在那裏睜眼細看乃是一夢心想此夢不很吉利便匆匆的回家而來到了家中果然不見小宛他的父母說話恍恍惚惚辟疆起了疑心不便追問父母便去詢他妻室只見他妻室蔡氏坐在室隅暗暗地啼哭見辟疆來問才揮淚把前後緣由說了出來辟疆聽著好像晴天霹靂這一驚真非同小可九遭浩劫轉徙風塵話說辟疆聽得小宛給亂兵掠去好像晴天霹靂氣得手足都冷想起小宛進門九年沒一樁事是不稱他心的亂兵掠去的時候又不忘舊情套了金釧而去益發把他傷心起來便著人四出探聽哪里還有下落在下現在姑且先表過不提且說小宛被亂兵搶去一路上哭哭啼啼好生淒慘想百年未到忽遭生離此行吉凶未蔔非但自己的前途很是危險便是辟疆回家得知也不知要怎樣的悲悼哩他一邊這樣思忖一邊又悼念來想以爲亂兵掠去必沒好事當初既和辟疆有恩情在先現在怎肯失身於他人他想來想去抱定了主意只得仍跟著亂兵隊伍而行也不知行了多少路程天色已經晚了阿史崔傳命亂兵們訪尋歇宿所在早有小兵尋到一所鄉人的莊宅便前去休息亂兵們少不得又到鄉人家中搶掠吃用的東西到也大家吃了一個快飽阿史崔又傳命小兵獻飯菜給小宛吃喝小宛哪里肯受小兵只得回報阿史崔那阿史崔本是豫王多鐸手下一名戈什哈因爲跟隨豫王多年才保舉他當了一名參將駐守如臯趁這時天下還沒曾平定的時候時常地方上搶掠劫擄無所不至此番搶得小宛見她生得嬌豔非常心中早有了主意以爲有了這樣人才自己的前程便可以靠她發達了原來阿史崔此番兵變本想飽掠一場回家去富家翁把這參將的官職倒也並不放在心上倘使豫王要處分他兵變的罪在這大亂未平的時候又伏著自己是患難相隨的人即使兵變