body:
  text: 順治出家民國陳蓮痕著目錄一論癡情細說緣由二墜風塵美人淪落三喜相逢一見傾心四話舊情緣訂三生五好姻緣天作之合六鷸蚌爭漁翁得利七丁亂世遍地萑苻八慘分離勞燕東西九遭浩劫轉徙風塵十獻美姬沽榮希寵十一侯門一入深如海十二懷舊情矢志不移十三賜瓷盆天子多情十四挖腰包典史倒運十五情蜜蜜體恤入微十六品芳蘭雅懷契合十七晉妃位恩承雨露十八得消息才子遁迹十九受掣肘好事多磨二十抱喪明悒鬱致疾二十一了孽緣香消玉殞二十二傷心人敝屣軒冕二十三清涼寺皈依參禪二十四大佈施南巡賜襪二十五真解脫永絕塵緣二十六倦雲遊歸真證果一論癡情細說緣由話說情生於愛愛生於孽男女之間惟有那個情字最容易發生重大的問題但是這個情字究竟作何解說這個答案本來很難說出的在下現在姑且胡說一句說是因爲有了相愛的心思才能有情的發生那相愛的起源都是前生的孽緣所以愛情兩個字便是孽緣的表現看官們聽著在下這話千萬不要誤會在下是迷信因果的人老實說起來世界上一切形形色色無論是什麽事情有果必有因有因也必有果那因果本來是可以成立的不過在下雖是深信冥冥中自有因果的但卻不去迷信著爲什麽既已信了又不去迷信呢因爲冥冥中果然是有因必有果有果必有因的但是能夠自己明白這因果的道理便可自己隨意留心了雖然已經造了不好的因卻可以自己造就了很好的果來然而話是這樣說世界上的人進了情網能夠跳出來的究有多少試看從古以來爲了個情字不知害掉了多少英明有爲的人論到情能爲害的緣由總脫不離男女相慕相愛的情形所以凡是人類除了太上忘情以外都有一種情感只要不遇著物件方面的吸力便可含糊過去不致發作出來倘是遇見了目的物有一天抱著情感表現那是入了情網要脫出便很難了所謂涓涓不塞流爲江河這樣說來情是很可怕的東西了要是免不了情的發現跳不出情的圈套果能達到情之目的並且能夠永久保守這情的圓滿目的到也可算得自己無負於情情也無負於自己倘然有一天在情場失敗下來那便糟了志氣短些的人竟至於把性命都送掉莫說身外之物大大的犧牲了在下說到這裏奉勸看官們千萬不要進了情的圈套免得自尋煩惱在下現在寫一段故事給看官們看看很可以給看官們作一個情場的借鏡這段故意乃是前清時代的一樁秘史很當得起哀感頑豔四個字在下現在先把這段故事的緣由寫些出來要論起這段故事的緣由尤須知道本書的主人翁本書的主人翁有兩人乃是一男一女男的是前清開國天子順治皇帝女的是才貌雙全的名妓董小宛除了順治皇帝和董小宛以外還有一個重要人物那重要人物是誰呢便是富冠江南才傾當時的名士冒辟疆那冒辟疆和董小宛順治皇帝都有密切的關係看官們看到後面自能明白但是在下這本書裏既有貴至人極的皇帝和傾國傾城的美人更有風流奇才的名士把這三人湊在一起當然可以給在下這本書生色得很哩然而美人終至不壽名士竟遭慘離皇帝也因此出家三人都沒有良好的結果說到緣由無非爲了這個情字所以推論起來到底仍是這個情字把三人的樂境完全送掉唉貴爲天子真所謂惟我獨尊的了既是惟我獨尊哪樣事還不稱他心哪樣事還辦不到手何致於爲一個婦人竟把皇位犧牲情願不做皇帝反去剃了頭髮去做光頭和尚但給這個情字所束縛便覺得富貴如浮雲了董小宛也是進了情的圈套不能跳了出來所以情願做平民的側室不願做天家的禁臠爲專制權威所逼迫舊愁新恨悒郁成疾黃土一抔斷送紅顔也可謂癡於情的了至於冒辟疆雖遭生離之慘不免黯然消魂究竟他是名士氣派胸襟較爲曠達沒曾因情喪身然而已是煩惱之至了二墜風塵美人淪落話說造物主人也是很費苦心莫說美人難得並且生了美人還要造成許多境遇有的是歡合有的是悲離弄來弄去總離不了這悲歡離合四個字所以生了楊玉環便配了李三郎天上人間比翼連理無非一場春夢而已閒話不提且表江南金陵地方有一個絕色奇才的女子這女子姓董名白小名喚作小宛別號青蓮她的父親早已死掉只有母親在堂她母親陳氏略曉字義所以小宛七八歲的時候她母親便教她念書識字她本是絕頂聰明的人見字即識識了不忘旁人見她好像是前生夙慧的都很稱許的了不得到十來歲的時候知識漸漸開了聰明也格外進步了於是識字讀書以外凡是女紅針線煮菜烹茶的事情都很精曉這時正當明朝崇禎六年的時候因爲北方饑荒江南受了影響米穀因此昂貴小宛的家世本很清苦平時靠她母親做活計度日到這時生活程度突然飛漲便覺得度日維艱起來恰巧隔鄰有個王嬤嬤乃是吃窯子飯的人見著小宛生得像天仙化成的模樣又聽得她聰明伶俐得秀便慫恿她母親把她送到窯子中間去混飯吃母親聽著本覺得吃窯子飯是沒臉的事情但是爲了饑寒所迫到以爲除了那條門路別無吃飯的所在了所以只得應允小宛奉了母親的命跟著王嬤嬤而去在秦淮河邊上立了一個門戶早有王嬤嬤籠絡著許多客人捧場的捧場走動的走動雖則小宛還是個小姑娘不過她生得一副絕世曠代的美貌又有那聰明伶俐的性格一般客人們個個都是愛她憐她都說董小宛是獨步秦淮的了這種豔名傳出來以一傳十以十傳百哪消多時早已聲震江南了這時小宛既是享了盛名門庭當然熱鬧非常在常人的心裏一旦僥倖享了盛名勢必自負不凡目空一世起來惟有小宛不如此原來小宛性喜幽靜現在雖是進了繁華場中卻不汩滅自己固有的本性所以大庭廣衆之間偶或碰到男女喧笑的事情她總覺毫無興趣她逢到春秋佳日便和知心的客人來到城外玩看山水的景致往往見著幽林遠壑對景有所感觸便依戀不肯即去因此她益得文人雅士的憐愛但是她看透世情覺得負名稱豔都是繁華一夢所以她平日常常攬鏡自照見了自己的影子每道我既生了這副皮骨倘若嫁給凡夫俗子尚且要有彩鳳隨鴉的感觸況且現在是飄花零葉像萍梗似的沒有歸宿的哩她既然有了這種思想便時時想擇人而事只因逛窯子的人固然文人也有雅士也有大部分的人無非是些紈絝公子大腹商賈顯宦熱僚文人雅士雖合小宛的意思但酸儒有才無力終不能付小宛之望紈絝公子大腹商賈顯宦熱僚固然富有巨金但小宛終覺得沒字碑徒有臭皮囊怎肯把清白身軀委事給他們因此逡巡了幾年終難得偕老百年的機會這時小宛青春已是十六歲王嬤嬤已經死了她便迎養她母親陳氏來主持了這個門戶她素來羡慕蘇州地方山明水秀風景比了金陵更是清幽便和陳氏說知想搬往蘇州去住陳氏本來膝下無兒只生得她一個女兒平日憐惜備至此番想搬往蘇州哪有不聽之理母女兩人當天商議了一番果然離開了金陵直往蘇州而來金陵離著蘇州不過幾天的水程所以不到幾天便已到蘇州她們來到蘇州便在半塘地方租了一所精致的房屋安安穩穩的住著三喜相逢一見傾心話說小宛和她母親陳氏從金陵搬到蘇州在半塘地方租得一所精致房屋安穩住著這時正當暮春天氣小宛成天的和陳氏遊山玩水凡是蘇州的名勝像虎丘山寒山寺天平鄧尉等許多地方沒有一處沒曾去過到也逍遙自在光陰迅速早已春盡夏來暫按小宛不言且說這時如臯地方有位才子姓冒名襄表字辟疆他的祖父和父親都是做過幾任優缺的大官所以家中有萬貫家財當得起如臯的首富辟疆原是滿腹才華只因命蹇運窮功名蹭蹬仍是青衫徜徉但是他生就一表人才姿儀天出神清徹膚一般女子們見著了他沒一個不有願嫁才子的感想他妻室蔡氏雖則容貌平常然性格溫婉又很賢淑也很通曉詩書所以伉儷之間非常和睦不過天生才子無不風流辟疆裘馬翩翩便到處流情但因自己高自期許常往妓院遊逛遇見一般庸姿陋質都不值他的眼裏這時辟疆來到金陵應試少不得有許多朋友來招呼那般朋友也都是留連風月的人素來知道秦淮佳麗是首數董小宛的現在勝友晤取大家都把小宛介紹給辟疆辟疆聽著便和朋友去訪恰巧小宛剛離金陵搬往蘇州了辟疆自歎緣慳草草進場應考三場完畢名落孫山那般朋友們見他下第歸來知道他心中定很煩悶便慫恿他道小宛近來聞已搬往蘇州吳中山水素負盛名何不前去一遊辟疆聽著有理果然也來到蘇州安寓停當即到半塘來訪小宛恰巧這時小宛又往洞庭山遊玩未返辟疆仍舊撲了個空只得和蘇州的朋友們花月詩酒作爲消遣足足在蘇州耽擱兩月光景心中記念著小宛想再去一訪來到半塘行行來早到了小宛寓所的門口短竹數叢苔生滿徑門臨小溪鳥啼花落風景十分幽閒辟疆照看雙扉輕輕剝啄似的彈了一聲門內走出一個四十多歲的婦人生得也很秀雅滿面陪笑的來問辟疆心想久聞小宛有母這人必是小宛的母親了便上前述了來意無非是久仰盛名前來一見的話那婦人道相公不是上次來過的嗎小宛剛從姻家回來昨天多喝了些酒現在還是醉著未醒哩但她明天又要出門往黃山去遊逛此行大概要一兩年才得回來相公此番見不著她不知又要等哪時候得相見所以不如進來候一候吧辟疆點頭稱是跟了陳氏進來只見五間花石砌成的小軒窗明几淨佈置得十分齊整早有雛婢獻上茶果陳氏和辟疆談天說地的談了半天便進後堂等了片時陳氏扶著一位身如輕燕眼流春的女子出來那女子香肌溫潤面暈和桃花似的這種香姿玉色真是天上少有人間難得的了只聽得陳氏說道小宛好生見過相公那女子聽得她母親說了這話才把初醒朦朧的眼睛微微的睜了一睜眼光像秋水似的正對著辟疆的眼珠打著一個照面他們倆人你看我我看你的看了一回卻都一言不發原來這時他們倆人已進了情網因爲辟疆見著小宛心以爲得遇此姬始不枉活了一生小宛見辟疆英姿秀爽便覺得此人必是個奇才之士心中也起了感想很有久曆風塵今方得人的意思這時辟疆好像遇著電力似的實在是愛得小宛到了極點恐怕小宛宿酒初醒沒有精神久陪便匆匆別歸過了一天小宛果然和她母親到黃山去遊逛了辟疆卻仍留在蘇州依然花月流連煙柳評量雖有曾經淪海除卻巫山的感慨但究是名士襟抱都看作行雲流水一般這時他又由朋友介紹結識了一名吳妓陳晚香綢繆了年把光景才離開蘇州回到如臯四話舊情緣訂三生話說冒辟疆在蘇州遊逛因爲董小宛往遊黃山便結識了陳晚香綢繆了年把光景晚香也以爲辟疆是風流奇才的美男子便有委身的意思辟疆看晚香雖沒有小宛的才色倒也可算是庸中佼佼所以也便允許晚香的要求住了多時辟疆離開蘇州回到如臯想回家後設法些款子給晚香脫籍這時盜賊蜂起遍地荊棘避疆便代父上下行賄免赴新任因此又耽擱了年把時候他父親見朝旨嚴急雖四處托人說情終不能不上新任只得硬著頭皮而去辟疆等他父親上任去了便忙到蘇州去踐晚香的夙約不料到蘇州晚香已給蘇州的勢豪鄉紳彭柏德強娶了去辟疆聽到這個消息心中實在是懊喪之至便立刻回家船離蘇州直往滸關而來路經一座小橋離著滸關已不很遠這地方實是清幽異常橋邊花成蔭更得天然